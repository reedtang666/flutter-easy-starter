name: flutter_easy_starter
description: Flutter 简易开箱即用框架 - 快速二次开发

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # 路由
  go_router: ^14.1.0

  # 网络请求
  dio: ^5.4.0
  pretty_dio_logger: ^1.3.1
  web_socket_channel: ^2.4.5
  connectivity_plus: ^6.0.3

  # 本地存储
  shared_preferences: ^2.2.2

  # 屏幕适配
  flutter_screenutil: ^5.9.0

  # 刷新控件
  pull_to_refresh_flutter3: ^2.0.2

  # 卡片滑动
  flutter_card_swiper: ^7.0.0

  # HTML渲染（隐私政策）
  flutter_html: ^3.0.0-beta.2
  webview_flutter: ^4.8.0

  # 图片缓存
  cached_network_image: ^3.3.1

  # 页面指示器
  smooth_page_indicator: ^1.1.0

  # 图片选择
  wechat_assets_picker: ^9.2.0
  wechat_camera_picker: ^4.3.1
  image_picker: ^1.1.2

  # 极光推送（可选，需要用户配置appKey）
  jpush_flutter: ^3.2.8

  # 微信SDK（可选，需要用户配置appId）
  fluwx: ^5.7.0

  # 权限管理
  permission_handler: ^11.3.0

  # 设备信息
  device_info_plus: ^10.1.0
  package_info_plus: ^8.0.0

  # 工具类
  common_utils: ^2.1.0
  date_format: ^2.0.9

  # UI增强
  flutter_easyloading: ^3.0.5
  flutter_spinkit: ^5.2.1
  lottie: ^3.1.0
  flutter_slidable: ^3.1.0
  shimmer: ^3.0.0
  flutter_lucide: ^1.4.0

  # 本地通知
  flutter_local_notifications: ^17.1.2

  # 路径
  path_provider: ^2.1.3

  # 图片压缩
  flutter_image_compress: ^2.3.0

  # 国际化
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9
  custom_lint: ^0.6.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/profiles/
    - assets/animations/
    - assets/images/guide/
    - assets/images/travel/destination/
    - assets/images/travel/activity/
    - assets/images/travel/profile/

  # 字体配置（可选）
  # 如需使用 Plus Jakarta Sans，请下载字体文件到 assets/fonts/ 目录
  # fonts:
  #   - family: Plus Jakarta Sans
  #     fonts:
  #       - asset: assets/fonts/PlusJakartaSans-Light.ttf
  #         weight: 300
  #       - asset: assets/fonts/PlusJakartaSans-Regular.ttf
  #         weight: 400
  #       - asset: assets/fonts/PlusJakartaSans-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/PlusJakartaSans-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/PlusJakartaSans-Bold.ttf
  #         weight: 700

